<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <!-- Tailwind CSS for Utility Class -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


        <!-- Font Awesome > For icon  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Css File Connect -->
    <link rel="stylesheet" href="Style/index.css">
    <!-- Google Font : Geist  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <title>github-issues-tracker</title>
</head>
<body>
<header>
  
<!-- navbar Section -->
<nav class="navbar bg-base-100 shadow-sm px-4 md:px-12 flex flex-col md:flex-row justify-between items-start md:items-center py-4 gap-3">
  
  <!-- Logo + Title -->
  <div class="flex items-center gap-2">
    <img src="assets/github-logo.png" alt="Logo" class="w-12">
    <h1 class="text-lg  font-bold text-gray-800">GitHub Issues Tracker</h1>
  </div>

  <!-- Search + Button -->
  <div class="flex items-center gap-2 w-full md:w-auto">
    
    <div class="relative w-full md:w-auto">
      <input 
        id="search-input"
        type="text"
        placeholder="🔍 Search issues..."
        class="input input-bordered w-full md:w-64"
      />
    </div>

    <button id="search-btn" class="btn bg-[#570DF8] hover:bg-[#4506cb] text-white border-none whitespace-nowrap">
      <i class="fa-solid fa-plus"></i> New Issue
    </button>

  </div>

</nav>

</header>

<main class="bg-[#F3F4F6] min-h-screen py-8 px-4 md:px-12 space-y-2">
  <!-- Button Section -->
<section class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-4">
    <div class="flex items-center gap-3">
      <button onclick="filterByStatus('all', event)" id="all-btn" class="btn filter-btn bg-[#570DF8] text-white  border-none rounded-lg px-6">All</button>
      <button onclick="filterByStatus('open', event)" id="open-btn" class=" filter-btn btn btn-ghost border border-gray-200 rounded-lg px-6">Open</button>
      <button onclick="filterByStatus('closed', event)" id="closed-btn" class="btn filter-btn btn-ghost border border-gray-200 rounded-lg px-6">Closed</button>
    </div>
</section>
<!-- Issues Counter section -->
<section class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="p-3 bg-purple-50 rounded-xl">
           <img src="assets/Aperture.png" alt="icon" class="w-6 h-6">
        </div>
        <div>
          <h3 class="font-bold text-2xl text-gray-800"><span id="issue-count">0</span> Issues</h3>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-4 text-sm font-semibold">
        <span class="flex items-center gap-2">
          <span class="w-3 h-3 bg-[#22C55E] rounded-full"></span> Open
        </span>
        <span class="flex items-center gap-2">
          <span class="w-3 h-3 bg-[#8B5CF6] rounded-full"></span> Closed
        </span>
      </div>
    </div>
</section>
<!-- Issues card Section -->
<section class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
   <div id="loading-spinner" class="col-span-full flex flex-col items-center py-20 text-gray-400"> 
          <span class="loading loading-dots loading-xl"></span>  
    </div> 

    <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
<!-- issues card -->

    <!-- loading-spinner  -->
     
    </div>
</section>


</main>

<dialog id="my_modal_1" class="modal">
  <div class="modal-box max-w-2xl p-8">

   
    <div id="modal-content">
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>

  </div>
</dialog>



    
    <!-- JavaScript -->
 
<script src="JavaScript/index.js"></script>
</body>
</html>
